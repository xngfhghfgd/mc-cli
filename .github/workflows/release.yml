name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: mc-cli-linux
            executable_name: mc-cli
          - os: windows-latest
            artifact_name: mc-cli-windows
            executable_name: mc-cli.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name mc-cli cli.py

      - name: Rename artifact on Windows
        if: runner.os == 'Windows'
        run: |
          Copy-Item dist\mc-cli.exe dist\${{ matrix.executable_name }}

      - name: Rename artifact on Linux
        if: runner.os == 'Linux'
        run: |
          cp dist/mc-cli dist/${{ matrix.executable_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.executable_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: mc-cli-linux
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: mc-cli-windows
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/mc-cli
            release-assets/mc-cli.exe
