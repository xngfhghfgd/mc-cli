name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip pyinstaller
      - run: pyinstaller --onefile --name mc-cli cli.py
      - run: |
          mkdir -p release-assets
          cp dist/mc-cli release-assets/mc-cli
      - uses: actions/upload-artifact@v4
        with:
          name: mc-cli-linux
          path: release-assets/mc-cli

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip pyinstaller
      - run: pyinstaller --onefile --name mc-cli cli.py
      - run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item dist\mc-cli.exe release-assets\mc-cli.exe
      - uses: actions/upload-artifact@v4
        with:
          name: mc-cli-windows
          path: release-assets/mc-cli.exe

  release:
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mc-cli-linux
          path: release-assets
      - uses: actions/download-artifact@v4
        with:
          name: mc-cli-windows
          path: release-assets
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/mc-cli
            release-assets/mc-cli.exe
